services:
  - type: web
    name: ansa-web
    env: node
    plan: starter
    # Every deploy installs from the workspace root, verifies profile/project assets,
    # rebuilds Next, and starts a fresh process that sees the new public files.
    buildCommand: npm install && npm run assets:check && npm run web:build
    startCommand: npm run web:start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ansa-api.onrender.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_NEWSLETTER
        sync: false
      - key: RESEND_FROM_CONTACT
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false

  - type: web
    name: ansa-api
    env: node
    plan: starter
    buildCommand: cd apps/api && npm install && npm run build
    startCommand: cd apps/api && npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_API_KEY
        sync: false
